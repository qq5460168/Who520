[dns]

# > DNS 防泄漏策略：
# > 1. no-system 禁用系统 DNS；
# > 2. doh-server 全部使用加密 DNS，多个服务器会并发查询；
# > 3. BlockHttpDNS 远程规则阻断 App 自带 HTTPDNS；
# > 4. filter_local 中 host-keyword, ., proxy 避免未命中域名为 GEOIP 触发本地解析。
prefer-doh3
no-ipv6
no-system
circumvent-ipv4-answer = 127.0.0.1, 0.0.0.0
circumvent-ipv6-answer = ::

# > 默认只启用国内两家加密 DNS。QX 会对同一行多个 doh-server 并发查询，启用越多暴露给越多解析服务商。
# > 境外网络或国内端点不可用时，可切换到下一行 Cloudflare + Google。
doh-server=https://88.lyq.916899380.xyz:8711/dns-query

# > Quantumult X 公开配置语法支持 DoH/DoQ；DoT 地址仅作参考，不直接启用。
; Tencent DoT: dot.pub
; 360 DoT: dot.360.cn
; Cloudflare DoT: one.one.one.one
; Google DoT: dns.google

# > 如需 DoQ，可按需启用。启用 DoQ 和 DoH 时会并发查询。
;doq-server = quic://dns.alidns.com:853

